<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Random Astronomy Image</title>

<style>
body{
  background:#0b0f1a;
  color:white;
  text-align:center;
  font-family:Arial;
  padding:20px;
}

img{
  max-width:95%;
  max-height:85vh;
  border-radius:10px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>Random Image from r/AstronomyPorn</h1>
<p id="title">Loading...</p>

<img id="astroImage">

<br>
<button onclick="loadImage()">New Image</button>

<script>

async function loadImage(){

  try{

    const redditURL = "https://www.reddit.com/r/AstronomyPorn/top.json?limit=100&t=week";
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(redditURL);

    const res = await fetch(proxy);
    const data = await res.json();

    const posts = data.data.children
      .map(p => p.data)
      .filter(p => p.preview && p.preview.images);

    const random = posts[Math.floor(Math.random()*posts.length)];

    const img = random.preview.images[0].source.url.replace(/&amp;/g,"&");

    document.getElementById("astroImage").src = img;
    document.getElementById("title").innerText = random.title;

  }catch(e){

    document.getElementById("title").innerText = "Failed to load image";

  }

}

loadImage();

</script>

</body>
</html>
